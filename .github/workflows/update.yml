name: Daily Paper Update

on:
  schedule:
    - cron: "42 6 * * *"  # Daily at 6:42 UTC
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-papers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run daily paper update pipeline
        run: python scripts/update_daily.py --days 3

      - name: Build VitePress site
        run: npm run docs:build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/ docs/
          git diff --staged --quiet || git commit -m "Daily paper update [skip ci]"
          git push

  deploy:
    needs: update-papers
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
